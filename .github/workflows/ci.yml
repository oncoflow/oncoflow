name: CI/CD Oncoflow

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  quality-security-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: "**/application/uv.lock"

      - name: Install dependencies
        run: |
          # uv installe la version de python requise et les dépendances (dev incluses pour la CI)
          cd application
          uv python install
          uv sync --frozen

      - name: Lint with ruff
        run: |
          uvx ruff format application/ --check

      - name: Ruff check
        run: |
          uvx ruff check application/

      - name: Run Tests
        run: |
          cd application
          PYTHONPATH=. uv run pytest tests/

      - name: Detect CVEs (Trivy)
        uses: aquasecurity/trivy-action@v0.24.0
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "table"
          exit-code: "1" # Fait échouer le job si des vulnérabilités CRITICAL/HIGH sont trouvées
          severity: "CRITICAL,HIGH"

      - name: Login to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Docker image
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          # Conversion en minuscules pour respecter le format docker
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=${{ github.sha }}
          docker build -f docker/Dockerfile -t $IMAGE_ID:$VERSION .

      - name: Push Docker image
        if: github.event_name == 'push'
        run: |
          IMAGE_ID=ghcr.io/${{ github.repository }}
          IMAGE_ID=$(echo $IMAGE_ID | tr '[A-Z]' '[a-z]')
          VERSION=${{ github.sha }}
          docker push $IMAGE_ID:$VERSION
