version: 2
updates:
  # Maintain GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  # Maintain Python dependencies in the application directory
  - package-ecosystem: "pip"
    directory: "/application"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  # Maintain Docker dependencies in the docker directory
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
