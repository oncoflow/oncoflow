apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: llama-cpp-chat
  annotations:
    run.googleapis.com/launch-stage: BETA
    run.googleapis.com/minScale: "0"
spec:
  template:
    metadata:
      annotations:
        run.googleapis.com/execution-environment: gen2
        run.googleapis.com/gpu-type: nvidia-l4
        run.googleapis.com/cpu-throttling: "false"
        run.googleapis.com/gpu-zonal-redundancy-disabled: "true"
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      containers:
      - image: ghcr.io/ggml-org/llama.cpp:server-cuda12
        env:
        - name: GGML_CUDA_PDL
          value: "0"
        - name: GGML_CUDA_DISABLE_GRAPHS
          value: "1"
        - name: LD_LIBRARY_PATH
          value: "/usr/local/cuda/compat:/usr/local/nvidia/lib64"
        args:
        # ─── Model ─────────────────────────────────────────────────────────────
        # Qwen3-8B Q4_K_M — ~5.0 GB VRAM — ~40 T/s on L4
        # Recommandé #1 : vitesse x2, même famille Qwen3, RAG compense la taille
        - "-hf"
        - "Qwen/Qwen3-8B-GGUF:Q4_K_M"
        - "--port"
        - "8080"
        - "--host"
        - "0.0.0.0"
        # ─── Context ───────────────────────────────────────────────────────────
        # 40k: même fenêtre que 14B — le 8B a plus de VRAM disponible pour le KV
        - "-c"
        - "40960"
        - "-n"
        - "32768"
        # ─── GPU ───────────────────────────────────────────────────────────────
        - "-ngl"
        - "99"
        - "--flash-attn"
        - "on"
        - "--no-mmap"
        # ─── Batch (8B: plus de VRAM libre → batchs plus larges) ───────────────
        # Batch prefill plus grand → TTFT réduit, meilleure utilisation L4
        - "-b"
        - "8192"
        # Micro-batch GPU plus large → tensor cores mieux saturés
        - "-ub"
        - "2048"
        # ─── Threading ─────────────────────────────────────────────────────────
        - "-t"
        - "4"
        # 4 slots parallèles — 8B libère ~19 GB pour 4 KV caches simultanés
        - "-np"
        - "4"
        # ─── KV Cache ──────────────────────────────────────────────────────────
        - "--cache-type-k"
        - "q4_0"
        - "--cache-type-v"
        - "q4_0"
        # ─── Sampling ──────────────────────────────────────────────────────────
        - "--temp"
        - "1.0"
        - "--top-p"
        - "0.95"
        - "--top-k"
        - "40"
        - "--min-p"
        - "0"
        - "--presence-penalty"
        - "2.0"
        - "--repeat-penalty"
        - "1.0"
        # ─── Qwen3 Thinking ────────────────────────────────────────────────────
        - "--jinja"
        - "--reasoning-format"
        - "deepseek"
        # 8k tokens de réflexion — suffisant pour extraction clinique structurée
        # Réduit la latence totale tout en gardant un raisonnement de qualité
        - "--reasoning-budget"
        - "8192"
        - "--reasoning-budget-message"
        - "\nOkay, I have enough information to answer."
        - "--no-context-shift"
        - "--no-warmup"
        ports:
        - containerPort: 8080
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 120
        resources:
          limits:
            cpu: "4"
            memory: "12Gi"      # 5 GB modèle + 4 KV caches + overhead OS
            nvidia.com/gpu: "1"
        volumeMounts:
        - name: gcs-hf-cache
          mountPath: /root/.cache/huggingface
      volumes:
      - name: gcs-hf-cache
        csi:
          driver: gcsfuse.run.googleapis.com
          volumeAttributes:
            bucketName: oncoflow-models-cache
